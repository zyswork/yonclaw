<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f7f7f4">
<title>XianZhu</title>
<link rel="manifest" href="manifest.json">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f7f4; --card: #fff; --border: #e8e8e4;
  --text: #262521; --text2: #666660; --text3: #999993;
  --accent: #262521; --green: #22c55e; --blue: #6366F1;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* 顶栏 */
.header {
  padding: 12px 16px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border); background: var(--card);
  position: sticky; top: 0; z-index: 10;
}
.header h1 { font-size: 16px; font-weight: 700; flex: 1; }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; margin-right: 4px;
}
.status-text { font-size: 11px; color: var(--text3); }

/* 消息区 */
.messages {
  flex: 1; overflow-y: auto; padding: 16px;
  -webkit-overflow-scrolling: touch;
}
.msg { margin-bottom: 12px; display: flex; }
.msg.user { justify-content: flex-end; }
.msg.assistant { justify-content: flex-start; }
.bubble {
  max-width: 80%; padding: 10px 14px; border-radius: 16px;
  font-size: 14px; line-height: 1.6; word-break: break-word;
}
.msg.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg.assistant .bubble { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg.system .bubble { background: #f0fdf4; border: 1px solid #bbf7d0; font-size: 13px; color: #166534; max-width: 90%; }
.thinking { color: var(--text3); font-size: 13px; display: flex; align-items: center; gap: 6px; }
.thinking .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }

/* 输入区 */
.input-area {
  padding: 10px 12px; border-top: 1px solid var(--border);
  background: var(--card); display: flex; gap: 8px; align-items: center;
}
.input-area input {
  flex: 1; padding: 10px 14px; border: 1px solid var(--border);
  border-radius: 20px; font-size: 14px; outline: none;
  background: var(--bg);
}
.input-area input:focus { border-color: var(--blue); }
.send-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent); color: #fff; border: none;
  font-size: 16px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.send-btn:disabled { opacity: .3; }

/* 空状态 */
.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty .icon { font-size: 48px; margin-bottom: 12px; opacity: .5; }

/* 会话列表 */
.sessions-panel {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg); z-index: 20; display: none; flex-direction: column;
}
.sessions-panel.show { display: flex; }
.session-item {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; font-size: 14px;
}
.session-item:active { background: rgba(0,0,0,.03); }
.session-item .time { font-size: 11px; color: var(--text3); margin-top: 2px; }
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="header">
  <div style="font-size:20px; cursor:pointer;" onclick="toggleSessions()">☰</div>
  <h1>XianZhu</h1>
  <div>
    <span class="status-dot" id="statusDot" style="background:var(--text3)"></span>
    <span class="status-text" id="statusText">连接中...</span>
  </div>
</div>

<!-- 消息区 -->
<div class="messages" id="messages">
  <div class="empty">
    <div class="icon">🤖</div>
    <div>发送消息开始对话</div>
    <div style="font-size:12px; margin-top:8px;">桌面端在线时自动转发，离线时云端回复</div>
  </div>
</div>

<!-- 输入区 -->
<div class="input-area">
  <input id="input" placeholder="输入消息..." autocomplete="off"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}">
  <button class="send-btn" onclick="send()" id="sendBtn">↑</button>
</div>

<!-- 会话列表面板 -->
<div class="sessions-panel" id="sessionsPanel">
  <div class="header">
    <div style="font-size:20px; cursor:pointer;" onclick="toggleSessions()">✕</div>
    <h1>会话列表</h1>
    <button onclick="newSession()" style="padding:6px 12px; border-radius:8px; background:var(--accent); color:#fff; border:none; font-size:13px; cursor:pointer;">新建</button>
  </div>
  <div id="sessionList" style="flex:1; overflow-y:auto;"></div>
</div>

<script>
// 配置
const API_BASE = location.origin + '/api/v1/chat'
const AGENT_ID = 'default'

let currentSession = localStorage.getItem('xianzhu_session') || ''
let sending = false
let messages = []

// 初始化
async function init() {
  await checkPresence()
  if (!currentSession) await newSession()
  else await loadMessages()
  setInterval(checkPresence, 30000)
}

// 检查桌面在线状态
async function checkPresence() {
  try {
    const r = await fetch(API_BASE + '/presence')
    const d = await r.json()
    const dot = document.getElementById('statusDot')
    const text = document.getElementById('statusText')
    if (d.desktopOnline) {
      dot.style.background = 'var(--green)'
      text.textContent = '桌面在线'
    } else {
      dot.style.background = '#f59e0b'
      text.textContent = '云端模式'
    }
  } catch {
    document.getElementById('statusDot').style.background = 'var(--text3)'
    document.getElementById('statusText').textContent = '离线'
  }
}

// 新建会话
async function newSession() {
  try {
    const r = await fetch(API_BASE + '/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agentId: AGENT_ID, title: '新对话' }),
    })
    const d = await r.json()
    currentSession = d.id
    localStorage.setItem('xianzhu_session', d.id)
    messages = []
    renderMessages()
    toggleSessions()
  } catch (e) { alert('创建失败: ' + e) }
}

// 加载消息
async function loadMessages() {
  if (!currentSession) return
  try {
    const r = await fetch(API_BASE + '/messages?sessionId=' + currentSession + '&limit=50')
    const d = await r.json()
    messages = (d.messages || []).map(m => ({ role: m.role, content: m.content || '' }))
    renderMessages()
  } catch { /* ignore */ }
}

// 加载会话列表
async function loadSessions() {
  try {
    const r = await fetch(API_BASE + '/sessions?agentId=' + AGENT_ID)
    const d = await r.json()
    const list = document.getElementById('sessionList')
    list.innerHTML = (d.sessions || []).map(s =>
      '<div class="session-item" onclick="selectSession(\'' + s.id + '\')">' +
        '<div>' + (s.title || '对话') + '</div>' +
        '<div class="time">' + new Date(parseInt(s.created_at)).toLocaleString('zh-CN') + '</div>' +
      '</div>'
    ).join('')
  } catch { /* ignore */ }
}

function selectSession(id) {
  currentSession = id
  localStorage.setItem('xianzhu_session', id)
  messages = []
  loadMessages()
  toggleSessions()
}

function toggleSessions() {
  const panel = document.getElementById('sessionsPanel')
  if (panel.classList.contains('show')) {
    panel.classList.remove('show')
  } else {
    loadSessions()
    panel.classList.add('show')
  }
}

// 发送消息
async function send() {
  const input = document.getElementById('input')
  const text = input.value.trim()
  if (!text || sending || !currentSession) return

  input.value = ''
  sending = true
  document.getElementById('sendBtn').disabled = true

  // 显示用户消息
  messages.push({ role: 'user', content: text })
  messages.push({ role: '_thinking', content: '' })
  renderMessages()

  try {
    const r = await fetch(API_BASE + '/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: currentSession, agentId: AGENT_ID, message: text }),
    })
    const d = await r.json()

    // 移除 thinking
    messages = messages.filter(m => m.role !== '_thinking')

    if (d.response) {
      messages.push({ role: 'assistant', content: d.response })
    } else if (d.status === 'forwarded') {
      messages.push({ role: 'system', content: '消息已转发到桌面端处理，请稍候...' })
      // TODO: SSE 监听桌面端的流式回复
    } else if (d.error) {
      messages.push({ role: 'system', content: '错误: ' + d.error })
    }
  } catch (e) {
    messages = messages.filter(m => m.role !== '_thinking')
    messages.push({ role: 'system', content: '发送失败: ' + e })
  }

  sending = false
  document.getElementById('sendBtn').disabled = false
  renderMessages()
}

// 渲染消息
function renderMessages() {
  const container = document.getElementById('messages')
  if (messages.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">🤖</div><div>发送消息开始对话</div><div style="font-size:12px;margin-top:8px;">桌面端在线时自动转发，离线时云端回复</div></div>'
    return
  }
  container.innerHTML = messages.map(m => {
    if (m.role === '_thinking') {
      return '<div class="msg assistant"><div class="thinking"><span class="dot"></span>思考中...</div></div>'
    }
    const cls = m.role === 'user' ? 'user' : m.role === 'system' ? 'system' : 'assistant'
    return '<div class="msg ' + cls + '"><div class="bubble">' + escapeHtml(m.content) + '</div></div>'
  }).join('')
  container.scrollTop = container.scrollHeight
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')
}

init()
</script>
</body>
</html>
