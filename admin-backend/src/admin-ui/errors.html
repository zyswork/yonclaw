<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>错误监控 - XianZhu 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh}
a{color:#58a6ff;text-decoration:none}
a:hover{text-decoration:underline}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:600}
.nav{display:flex;gap:16px}
.nav a{padding:6px 12px;border-radius:6px;color:#c9d1d9;font-size:14px}
.nav a:hover,.nav a.active{background:#21262d;color:#f0f6fc;text-decoration:none}
.container{max-width:1400px;margin:0 auto;padding:24px}
.filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e1e4e8;font-size:13px}
.filters button{padding:8px 16px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;cursor:pointer;font-size:13px}
.filters button:hover{background:#30363d}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;background:#161b22;border-bottom:1px solid #30363d;color:#8b949e;font-weight:600;position:sticky;top:0}
td{padding:10px 12px;border-bottom:1px solid #21262d;vertical-align:top}
tr:hover td{background:#161b22}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-error{background:#3d1014;color:#f85149}
.badge-warn{background:#3d2e00;color:#d29922}
.badge-info{background:#0c2d6b;color:#58a6ff}
.pagination{display:flex;justify-content:center;gap:8px;margin-top:20px}
.pagination button{padding:6px 14px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;cursor:pointer;font-size:13px}
.pagination button:hover{background:#30363d}
.pagination button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.pagination button:disabled{opacity:.4;cursor:not-allowed}
.msg-cell{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-cell:hover{white-space:normal;word-break:break-all}
.auto-refresh{font-size:12px;color:#8b949e}
.login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:32px;width:360px}
.login-box h2{margin-bottom:20px;text-align:center}
.login-box input{width:100%;padding:10px 12px;margin-bottom:12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e1e4e8;font-size:14px}
.login-box button{width:100%;padding:10px;background:#238636;border:none;border-radius:6px;color:#fff;font-size:14px;cursor:pointer;font-weight:600}
.login-box .error{color:#f85149;font-size:13px;margin-bottom:8px}
.hidden{display:none}
</style>
</head>
<body>
<div class="header">
  <h1>错误监控</h1>
  <div class="nav">
    <a href="/admin/">仪表盘</a>
    <a href="/admin/errors.html" class="active">错误监控</a>
    <a href="/admin/users.html">用户概览</a>
    <a href="/admin/devices.html">设备列表</a>
    <a href="#" id="logoutBtn">退出</a>
  </div>
</div>

<div class="login-overlay hidden" id="loginOverlay">
  <div class="login-box">
    <h2>管理员登录</h2>
    <div class="error hidden" id="loginError"></div>
    <input type="email" id="loginEmail" placeholder="邮箱" value="admin@xianzhu.com">
    <input type="password" id="loginPassword" placeholder="密码">
    <button id="loginBtn">登录</button>
  </div>
</div>

<div class="container">
  <div class="filters">
    <select id="filterType"><option value="">全部类型</option></select>
    <select id="filterPlatform"><option value="">全部平台</option></select>
    <input type="date" id="filterStart" placeholder="开始日期">
    <input type="date" id="filterEnd" placeholder="结束日期">
    <button id="searchBtn">查询</button>
    <button id="resetBtn">重置</button>
    <span class="auto-refresh">每 30 秒自动刷新</span>
  </div>

  <table>
    <thead>
      <tr>
        <th>时间</th>
        <th>用户</th>
        <th>类型</th>
        <th>错误码</th>
        <th>消息</th>
        <th>平台</th>
        <th>版本</th>
      </tr>
    </thead>
    <tbody id="errorTable"></tbody>
  </table>

  <div class="pagination" id="pagination"></div>
</div>

<script>
const API = '/api/v1';
let currentPage = 0;
const PAGE_SIZE = 50;
let knownTypes = new Set();
let knownPlatforms = new Set();

function getToken() { return localStorage.getItem('admin_token'); }
function setToken(t) { localStorage.setItem('admin_token', t); }
function clearToken() { localStorage.removeItem('admin_token'); }
function authHeaders() { const t = getToken(); return t ? { 'Authorization': 'Bearer ' + t } : {}; }
async function apiFetch(url) {
  const res = await fetch(API + url, { headers: authHeaders() });
  if (res.status === 401) { showLogin(); throw new Error('未认证'); }
  return res.json();
}
function showLogin() { document.getElementById('loginOverlay').classList.remove('hidden'); }
function hideLogin() { document.getElementById('loginOverlay').classList.add('hidden'); }

document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  try {
    const res = await fetch(API + '/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || '登录失败'; errEl.classList.remove('hidden'); return; }
    setToken(data.token); hideLogin(); loadErrors();
  } catch (e) { errEl.textContent = '网络错误'; errEl.classList.remove('hidden'); }
};
document.getElementById('logoutBtn').onclick = (e) => { e.preventDefault(); clearToken(); showLogin(); };

function badgeClass(type) {
  if (!type) return 'badge-info';
  const t = type.toLowerCase();
  if (t.includes('error') || t.includes('crash') || t.includes('fatal')) return 'badge-error';
  if (t.includes('warn')) return 'badge-warn';
  return 'badge-info';
}

function formatTime(ts) {
  if (!ts) return '--';
  const d = new Date(ts);
  return d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

async function loadErrors() {
  try {
    const type = document.getElementById('filterType').value;
    const platform = document.getElementById('filterPlatform').value;
    const start = document.getElementById('filterStart').value;
    const end = document.getElementById('filterEnd').value;

    let qs = `?limit=${PAGE_SIZE}&offset=${currentPage * PAGE_SIZE}`;
    if (type) qs += `&errorType=${encodeURIComponent(type)}`;
    if (platform) qs += `&platform=${encodeURIComponent(platform)}`;
    if (start) qs += `&startDate=${start}T00:00:00`;
    if (end) qs += `&endDate=${end}T23:59:59`;

    const data = await apiFetch('/telemetry/errors' + qs);
    const rows = data.data || [];
    const total = data.total || 0;

    // 更新过滤器选项
    rows.forEach(r => { if (r.errorType) knownTypes.add(r.errorType); if (r.platform) knownPlatforms.add(r.platform); });
    updateFilterOptions();

    const tbody = document.getElementById('errorTable');
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>${formatTime(r.createdAt)}</td>
        <td>${r.userEmail || r.userId || '--'}</td>
        <td><span class="badge ${badgeClass(r.errorType)}">${r.errorType}</span></td>
        <td>${r.errorCode || '--'}</td>
        <td class="msg-cell" title="${(r.message || '').replace(/"/g, '&quot;')}">${r.message || '--'}</td>
        <td>${r.platform || '--'}</td>
        <td>${r.appVersion || '--'}</td>
      </tr>
    `).join('');

    // 分页
    const totalPages = Math.ceil(total / PAGE_SIZE);
    const pagEl = document.getElementById('pagination');
    let pagHtml = '';
    pagHtml += `<button ${currentPage === 0 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">上一页</button>`;
    pagHtml += `<span style="padding:6px;color:#8b949e;font-size:13px">${currentPage + 1} / ${totalPages || 1} (共 ${total} 条)</span>`;
    pagHtml += `<button ${currentPage >= totalPages - 1 ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">下一页</button>`;
    pagEl.innerHTML = pagHtml;
  } catch (e) {
    console.error('加载错误列表失败:', e);
  }
}

function goPage(p) { currentPage = Math.max(0, p); loadErrors(); }

function updateFilterOptions() {
  const typeEl = document.getElementById('filterType');
  const platEl = document.getElementById('filterPlatform');
  const curType = typeEl.value;
  const curPlat = platEl.value;
  typeEl.innerHTML = '<option value="">全部类型</option>' + [...knownTypes].sort().map(t => `<option value="${t}" ${t===curType?'selected':''}>${t}</option>`).join('');
  platEl.innerHTML = '<option value="">全部平台</option>' + [...knownPlatforms].sort().map(p => `<option value="${p}" ${p===curPlat?'selected':''}>${p}</option>`).join('');
}

document.getElementById('searchBtn').onclick = () => { currentPage = 0; loadErrors(); };
document.getElementById('resetBtn').onclick = () => {
  document.getElementById('filterType').value = '';
  document.getElementById('filterPlatform').value = '';
  document.getElementById('filterStart').value = '';
  document.getElementById('filterEnd').value = '';
  currentPage = 0;
  loadErrors();
};

if (!getToken()) { showLogin(); } else { loadErrors(); }
setInterval(() => { if (getToken()) loadErrors(); }, 30000);
</script>
</body>
</html>
