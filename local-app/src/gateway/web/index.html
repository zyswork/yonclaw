<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>衔烛 Web UI</title>
  <style>
    :root {
      --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #252525; --border: #333;
      --text: #e0e0e0; --text2: #888; --accent: #3b82f6; --accent-bg: rgba(59,130,246,0.1);
      --success: #22c55e; --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; }
    #sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    #sidebar h1 { padding: 16px; font-size: 18px; border-bottom: 1px solid var(--border); }
    #sidebar h1 span { font-size: 22px; }
    #agent-list { flex: 1; overflow-y: auto; padding: 8px; }
    .agent-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; font-size: 14px; }
    .agent-item:hover { background: var(--bg3); }
    .agent-item.active { background: var(--accent-bg); border: 1px solid var(--accent); }
    .agent-item .model { font-size: 11px; color: var(--text2); margin-top: 2px; }
    #sidebar-footer { padding: 12px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text2); }
    #main { flex: 1; display: flex; flex-direction: column; }
    #status-bar { padding: 8px 16px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text2); display: flex; justify-content: space-between; align-items: center; }
    #status-bar .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    .badge-ok { background: rgba(34,197,94,0.15); color: var(--success); }
    .badge-err { background: rgba(239,68,68,0.15); color: var(--error); }
    #messages { flex: 1; overflow-y: auto; padding: 16px; }
    .msg { margin-bottom: 12px; display: flex; gap: 10px; }
    .msg.user { justify-content: flex-end; }
    .msg .bubble { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .msg.user .bubble { background: var(--accent); color: #fff; }
    .msg.assistant .bubble { background: var(--bg3); }
    .msg.system .bubble { background: rgba(251,191,36,0.1); color: #fbbf24; font-size: 12px; border: 1px solid rgba(251,191,36,0.2); }
    #input-area { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    #input-area input { flex: 1; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
    #input-area input:focus { border-color: var(--accent); }
    #input-area button { padding: 10px 20px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    #input-area button:hover:not(:disabled) { opacity: 0.9; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1><span>🐾</span> 衔烛</h1>
    <div id="agent-list"></div>
    <div id="sidebar-footer">
      <div id="version-info">Connecting...</div>
    </div>
  </div>
  <div id="main">
    <div id="status-bar">
      <span id="agent-name">Select an agent</span>
      <span id="connection-badge" class="badge badge-err">Disconnected</span>
    </div>
    <div id="messages">
      <div class="empty-state">
        <div class="icon">💬</div>
        <div>Select an agent and start chatting</div>
      </div>
    </div>
    <div id="input-area">
      <input id="chat-input" placeholder="Type a message... (Enter to send)" disabled>
      <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let currentAgent = null;
    let sessionId = 'web-session-' + Date.now();
    let messages = [];

    async function api(path, opts) {
      const resp = await fetch(API + path, {
        headers: { 'Content-Type': 'application/json' },
        ...opts
      });
      return resp.json();
    }

    async function init() {
      try {
        const health = await api('/api/v1/health');
        document.getElementById('version-info').textContent = `v${health.version} · ${health.status}`;
        document.getElementById('connection-badge').textContent = 'Connected';
        document.getElementById('connection-badge').className = 'badge badge-ok';

        const data = await api('/api/v1/agents');
        renderAgents(data.agents || []);
        if (data.agents?.length) selectAgent(data.agents[0]);
      } catch (e) {
        document.getElementById('version-info').textContent = 'Connection failed';
        document.getElementById('connection-badge').textContent = 'Error';
        document.getElementById('connection-badge').className = 'badge badge-err';
      }
    }

    function renderAgents(agents) {
      const list = document.getElementById('agent-list');
      list.innerHTML = agents.map(a => `
        <div class="agent-item" onclick="selectAgent(${JSON.stringify(a).replace(/"/g, '&quot;')})" id="agent-${a.id}">
          <div>${a.name}</div>
          <div class="model">${a.model}</div>
        </div>
      `).join('');
    }

    function selectAgent(agent) {
      currentAgent = agent;
      document.querySelectorAll('.agent-item').forEach(el => el.classList.remove('active'));
      const el = document.getElementById('agent-' + agent.id);
      if (el) el.classList.add('active');
      document.getElementById('agent-name').textContent = `${agent.name} (${agent.model})`;
      document.getElementById('chat-input').disabled = false;
      document.getElementById('send-btn').disabled = false;
      messages = [];
      sessionId = 'web-' + Date.now();
      renderMessages();
    }

    function renderMessages() {
      const container = document.getElementById('messages');
      if (messages.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">💬</div><div>Start chatting</div></div>';
        return;
      }
      container.innerHTML = messages.map(m => `
        <div class="msg ${m.role}">
          <div class="bubble">${escapeHtml(m.content)}</div>
        </div>
      `).join('');
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !currentAgent) return;

      input.value = '';
      messages.push({ role: 'user', content: text });
      messages.push({ role: 'assistant', content: '...' });
      renderMessages();

      try {
        const resp = await api('/api/v1/message', {
          method: 'POST',
          body: JSON.stringify({
            agentId: currentAgent.id,
            sessionId: sessionId,
            message: text
          })
        });
        messages[messages.length - 1].content = resp.response || resp.error || '(empty)';
      } catch (e) {
        messages[messages.length - 1] = { role: 'system', content: 'Error: ' + e.message };
      }
      renderMessages();
    }

    document.getElementById('chat-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    init();
  </script>
</body>
</html>
