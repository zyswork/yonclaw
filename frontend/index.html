<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XianZhu</title>
    <script>
      // 在 CSS 加载前立即设置主题，防止闪屏
      (function(){
        var t = localStorage.getItem('xianzhu.theme');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
        else if (t === 'system' && window.matchMedia('(prefers-color-scheme: light)').matches) document.documentElement.setAttribute('data-theme', 'light');
      })();
    </script>
    <style>html{background:#0a0a0f}html[data-theme="light"]{background:#eef0f4}</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
