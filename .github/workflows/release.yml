name: Release (cross-platform)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            local-app/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('local-app/Cargo.lock') }}

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^1" --locked || true

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Build frontend
        working-directory: frontend
        run: npx vite build

      - name: Build Tauri (${{ matrix.name }})
        working-directory: local-app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xianzhu-${{ matrix.name }}
          path: |
            local-app/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            local-app/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            local-app/target/${{ matrix.target }}/release/bundle/deb/*.deb
            local-app/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            local-app/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            local-app/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            local-app/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            local-app/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            local-app/target/${{ matrix.target }}/release/bundle/deb/*.deb
            local-app/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            local-app/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            local-app/target/${{ matrix.target }}/release/bundle/msi/*.msi
          draft: true
          fail_on_unmatched_files: false
