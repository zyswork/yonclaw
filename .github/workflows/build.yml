name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macOS-ARM64
            target: darwin-aarch64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            label: macOS-x64
            target: darwin-x86_64
          - platform: windows-latest
            args: ''
            label: Windows-x64
            target: windows-x86_64
          - platform: ubuntu-22.04
            args: ''
            label: Linux-x64
            target: linux-x86_64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libjavascriptcoregtk-4.0-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npx vite build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.6" --locked

      - name: Build Tauri
        working-directory: local-app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: cargo tauri build ${{ matrix.args }}

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: XianZhu-${{ matrix.label }}
          path: |
            local-app/target/**/release/bundle/dmg/*.dmg
            local-app/target/**/release/bundle/macos/*.tar.gz
            local-app/target/**/release/bundle/macos/*.tar.gz.sig

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: XianZhu-${{ matrix.label }}
          path: |
            local-app/target/release/bundle/msi/*.msi
            local-app/target/release/bundle/msi/*.msi.zip
            local-app/target/release/bundle/msi/*.msi.zip.sig

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: XianZhu-${{ matrix.label }}
          path: |
            local-app/target/release/bundle/appimage/*.AppImage
            local-app/target/release/bundle/appimage/*.AppImage.tar.gz
            local-app/target/release/bundle/appimage/*.AppImage.tar.gz.sig
            local-app/target/release/bundle/deb/*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.tar.gz
            artifacts/**/*.sig

      - name: Publish update info to server
        if: success()
        env:
          UPDATE_PUBLISH_SECRET: ${{ secrets.UPDATE_PUBLISH_SECRET }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          REPO="zyswork/xianzhu"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Read signatures
          MACOS_ARM_SIG=$(cat artifacts/XianZhu-macOS-ARM64/**/release/bundle/macos/*.sig 2>/dev/null || echo "")
          MACOS_X64_SIG=$(cat artifacts/XianZhu-macOS-x64/**/release/bundle/macos/*.sig 2>/dev/null || echo "")
          WINDOWS_SIG=$(cat artifacts/XianZhu-Windows-x64/*.sig 2>/dev/null || echo "")
          LINUX_SIG=$(cat artifacts/XianZhu-Linux-x64/*.sig 2>/dev/null || echo "")

          curl -s -X POST "https://zys-openclaw.com/api/v1/update/publish" \
            -H "Authorization: Bearer ${UPDATE_PUBLISH_SECRET}" \
            -H "Content-Type: application/json" \
            -d "{
              \"version\": \"${VERSION}\",
              \"notes\": \"Release ${TAG}\",
              \"pub_date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
              \"platforms\": {
                \"darwin-aarch64\": {\"url\": \"${BASE_URL}/XianZhu_${VERSION}_aarch64.app.tar.gz\", \"signature\": \"${MACOS_ARM_SIG}\"},
                \"darwin-x86_64\": {\"url\": \"${BASE_URL}/XianZhu_${VERSION}_x64.app.tar.gz\", \"signature\": \"${MACOS_X64_SIG}\"},
                \"windows-x86_64\": {\"url\": \"${BASE_URL}/XianZhu_${VERSION}_x64_en-US.msi.zip\", \"signature\": \"${WINDOWS_SIG}\"},
                \"linux-x86_64\": {\"url\": \"${BASE_URL}/xian-zhu_${VERSION}_amd64.AppImage.tar.gz\", \"signature\": \"${LINUX_SIG}\"}
              }
            }" || echo "Warning: Failed to publish update info"
