name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            local-app/target
          key: ${{ runner.os }}-cargo-ci-${{ hashFiles('local-app/Cargo.lock') }}
      - name: Create stub Python resources (CI tests without embedded Python sandbox)
        shell: bash
        run: |
          mkdir -p local-app/resources/wheels
          if [ ! -f local-app/resources/python.tar.gz ]; then
            mkdir -p /tmp/xianzhu-stub && echo "stub" > /tmp/xianzhu-stub/.stub
            tar -czf local-app/resources/python.tar.gz -C /tmp/xianzhu-stub .stub
            touch local-app/resources/wheels/.gitkeep
          fi
      # tauri::generate_context! 在编译时校验 devPath 指向的 frontend/dist 存在。
      # test-rust job 需要先 vite build 产出 dist，否则 proc macro 会 panic。
      - name: Setup Node (for frontend build prerequisite)
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build frontend (for tauri::generate_context!)
        working-directory: frontend
        run: npm ci && npx vite build
      - name: Rust tests
        working-directory: local-app
        run: cargo test --release --no-fail-fast
      - name: Clippy
        working-directory: local-app
        run: cargo clippy --release --no-deps -- -D warnings || true

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        working-directory: frontend
        run: npm ci || npm install
      - name: Vite build
        working-directory: frontend
        run: npx vite build
      - name: Vitest
        working-directory: frontend
        run: npx vitest run --reporter=default || echo "vitest optional"
